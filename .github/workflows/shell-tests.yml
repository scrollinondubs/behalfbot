name: Shell unit tests

# shell-lint.yml runs shellcheck, which catches syntax and idiom problems but
# no behavior. The chassis-update healthcheck bug this job guards was valid
# shell that always returned success, so lint could never have caught it.
#
# Scoped to the self-contained suites only. test-daily-log-gather.sh is not
# here: it needs python3 + jq and is run by hand.

on:
  pull_request:
    branches: [main]
    paths:
      - 'chassis/scripts/_chassis-update-health.sh'
      - 'chassis/scripts/chassis-update.sh'
      - 'chassis/scripts/test-chassis-update-health.sh'
      - 'chassis/scripts/_env.sh'
      - 'chassis/scripts/resolve-plugin-root.sh'
      - 'chassis/scripts/test-plugin-root-resolution.sh'
      - 'chassis/scripts/resolve-chassis-root.sh'
      - 'chassis/scripts/test-chassis-root-resolution.sh'
      - 'docker/entrypoint.sh'
      - 'plugins/dating/scripts/emulator-state.sh'
      - 'plugins/dating/scripts/gather-dating-swipe.sh'
      - 'plugins/dating/scheduled-tasks/recovery-hooks.d/dating-emulator-recovery.sh'
      - 'plugins/dating/tests/test-emulator-state.sh'
      - '.github/workflows/shell-tests.yml'
  push:
    branches: [main]
    paths:
      - 'chassis/scripts/_chassis-update-health.sh'
      - 'chassis/scripts/chassis-update.sh'
      - 'chassis/scripts/test-chassis-update-health.sh'
      - 'chassis/scripts/_env.sh'
      - 'chassis/scripts/resolve-plugin-root.sh'
      - 'chassis/scripts/test-plugin-root-resolution.sh'
      - 'chassis/scripts/resolve-chassis-root.sh'
      - 'chassis/scripts/test-chassis-root-resolution.sh'
      - 'docker/entrypoint.sh'
      - 'plugins/dating/scripts/emulator-state.sh'
      - 'plugins/dating/scripts/gather-dating-swipe.sh'
      - 'plugins/dating/scheduled-tasks/recovery-hooks.d/dating-emulator-recovery.sh'
      - 'plugins/dating/tests/test-emulator-state.sh'
      - '.github/workflows/shell-tests.yml'
  workflow_dispatch:

jobs:
  chassis-update-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No docker daemon needed - the suite stubs the docker CLI on PATH.
      - run: bash chassis/scripts/test-chassis-update-health.sh

  plugin-root-resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Behavioural coverage for the v0.2.0 inert-feature bug: asserts the
      # resolved plugin root actually serves fetched plugins when a fetched
      # tree is present. No docker daemon, runs against temp dirs.
      - run: bash chassis/scripts/test-plugin-root-resolution.sh

  chassis-root-resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Behavioural coverage for stale-baked-chassis drift: asserts a usable
      # live (mounted/vendored) chassis tree actually becomes the resolved
      # root, torn or cross-MAJOR trees force baked LOUDLY (exit 5), and
      # _env.sh resolves docker-exec sessions through the state symlink.
      # No docker daemon, runs against temp dirs.
      - run: bash chassis/scripts/test-chassis-root-resolution.sh

  dating-emulator-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Behavioural coverage for the RUNNING_LOCKED blind spot: a PIN-locked
      # AVD passes every legacy readiness signal while unable to launch any
      # app. The suite stubs adb on PATH and proves the probe distinguishes
      # locked from unlocked, the gather reports emulator_locked instead of
      # ready, and the recovery hook unlocks rather than restart-looping.
      - run: bash plugins/dating/tests/test-emulator-state.sh
